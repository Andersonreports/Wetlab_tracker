<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anderson Lab — Tracker Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    linear-gradient(135deg,#eef2ff 0%,#f5f0ff 100%);
      --panel: rgba(255,255,255,0.80);
      --pb:    rgba(255,255,255,0.55);
      --text:  #1e293b;
      --muted: #64748b;
      --pri:   #4f46e5;
      --pri-h: #4338ca;
      --bdr:   #d1d5db;
      --ib:    rgba(255,255,255,0.9);
      --sh:    0 4px 24px rgba(79,70,229,.10),0 1px 4px rgba(0,0,0,.05);
      --sh-lg: 0 12px 48px rgba(79,70,229,.18);
      --r:     16px;
      --rs:    8px;
      --tr:    all .22s cubic-bezier(.4,0,.2,1);
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:linear-gradient(135deg,#0d1117 0%,#161b27 100%);
        --panel:rgba(22,30,46,.88);--pb:rgba(255,255,255,.08);
        --text:#e2e8f0;--muted:#8899a6;
        --ib:rgba(13,17,23,.7);--bdr:#2d3748;
        --sh:0 4px 24px rgba(0,0,0,.5);--sh-lg:0 12px 48px rgba(0,0,0,.6);
      }
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;font-size:14px;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;
    }

    /* ── Card ── */
    .card{
      width:100%;max-width:420px;
      background:var(--panel);
      backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
      border:1px solid var(--pb);border-radius:var(--r);
      box-shadow:var(--sh-lg);
      padding:40px 36px 36px;
    }

    /* ── Lock icon ── */
    .lock-wrap{
      width:60px;height:60px;border-radius:50%;
      background:linear-gradient(135deg,#4f46e5,#8b5cf6);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;box-shadow:0 6px 20px rgba(79,70,229,.35);
    }
    .lock-wrap svg{width:28px;height:28px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* ── Heading ── */
    .card-title{
      font-size:22px;font-weight:800;letter-spacing:-.4px;text-align:center;
      background:linear-gradient(135deg,#4f46e5,#8b5cf6);
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:4px;
    }
    .card-sub{
      font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;
    }

    /* ── Form ── */
    .field{margin-bottom:18px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}
    input{
      width:100%;padding:10px 14px;border-radius:var(--rs);
      border:1.5px solid var(--bdr);background:var(--ib);color:var(--text);
      font-family:inherit;font-size:14px;outline:none;transition:var(--tr);
    }
    input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
    input::placeholder{color:var(--muted);opacity:.7}

    /* ── Submit button ── */
    .btn-login{
      width:100%;padding:11px;border-radius:var(--rs);
      border:none;cursor:pointer;font-family:inherit;
      font-size:14px;font-weight:700;color:#fff;
      background:linear-gradient(135deg,#4f46e5,#6366f1);
      box-shadow:0 4px 16px rgba(79,70,229,.35);
      transition:var(--tr);margin-top:6px;
    }
    .btn-login:hover{background:linear-gradient(135deg,#4338ca,#4f46e5);transform:translateY(-1px);box-shadow:0 6px 22px rgba(79,70,229,.45)}
    .btn-login:active{transform:translateY(0)}

    /* ── Error message ── */
    .login-error{
      color:#dc2626;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);
      border-radius:var(--rs);padding:10px 14px;font-size:13px;font-weight:500;
      margin-bottom:16px;text-align:center;
    }

    /* ── Footer badge ── */
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      margin-top:24px;padding:6px 14px;border-radius:20px;
      font-size:11px;font-weight:600;color:var(--muted);
      background:rgba(79,70,229,.06);border:1px solid rgba(79,70,229,.12);
    }
    .badge svg{width:13px;height:13px;stroke:var(--pri);stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .footer{text-align:center}
  </style>
</head>
<body>

  <div class="card">
    <!-- Lock icon -->
    <div class="lock-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <h1 class="card-title">Report Tracker</h1>
    <p class="card-sub">Anderson Lab · Secure Access</p>

    <!--ERROR_PLACEHOLDER-->

    <form method="POST" action="/tracker/login" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username" name="username" type="text"
          placeholder="Enter your username"
          required autocomplete="username" autofocus
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password" name="password" type="password"
          placeholder="Enter your password"
          required autocomplete="current-password"
        />
      </div>

      <button class="btn-login" type="submit">Sign In</button>
    </form>

    <div class="footer">
      <span class="badge">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Secured with JWT · HttpOnly cookie · Rate-limited
      </span>
    </div>
  </div>

</body>
</html>
