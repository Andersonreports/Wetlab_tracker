<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anderson CMC-ONCO Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --sidebar-bg: #ecfdf5; /* Very soft Mint */
      --sidebar-text: #065f46; /* Sage Green */
      --sidebar-active-bg: #d1fae5;
      --sidebar-active-text: #064e3b;
      --accent: #10b981; /* Fresh Mint */
      --accent-hover: #059669;
      --main-bg: #f9fffb;
      --card-bg: #ffffff;
      --text-main: #064e3b;
      --text-muted: #6b7280;
      --border: #d1fae5;
      --shadow: 0 4px 12px rgba(16, 185, 129, 0.08);
      --shadow-lg: 0 10px 25px rgba(16, 185, 129, 0.12);
      --tr: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--main-bg);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Sidebar --- */
    .sidebar {
      width: 280px;
      background-color: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
      transition: all 0.3s ease;
      z-index: 50;
    }

    .sidebar-header {
      padding: 0 24px 32px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--sidebar-text);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upload-section {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .btn-upload-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background-color: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
    }

    .btn-upload-trigger:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
    }

    /* ... */
    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: none;
      border: none;
      color: var(--sidebar-text);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 12px;
      transition: var(--tr);
      margin-bottom: 4px;
    }

    .nav-btn:hover {
      background-color: var(--sidebar-active-bg);
      color: var(--sidebar-active-text);
    }

    .nav-btn.active {
      background-color: var(--sidebar-active-bg);
      color: var(--sidebar-active-text);
      font-weight: 700;
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .nav-btn .label {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* --- Main Content --- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      height: 80px;
      background-color: var(--main-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      gap: 32px;
      flex-shrink: 0;
    }

    .top-bar-left {
      flex: 1;
      max-width: 600px;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .search-container {
      position: relative;
      display: flex;
      align-items: center;
      background-color: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: var(--tr);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.05);
    }

    .search-container:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .search-container i.search-icon {
      margin-left: 16px;
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      color: var(--text-main);
    }

    .btn-search-exec {
      background-color: var(--accent);
      color: #fff;
      border: none;
      margin: 6px 8px 6px 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--tr);
    }

    .btn-search-exec:hover {
      background-color: var(--accent-hover);
      transform: scale(1.08);
    }

    .btn-search-exec svg {
      width: 15px;
      height: 15px;
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #cbd5e1;
      border-radius: 50%;
    }
    .status-dot.active { background-color: #10b981; }

    .btn-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--tr);
      color: var(--text-main);
    }

    .btn-filter:hover {
      background-color: var(--main-bg);
      border-color: var(--text-muted);
    }

    .btn-filter.active {
      background-color: var(--sidebar-bg);
      color: #fff;
    }

    /* --- Table Container --- */
    .table-container {
      flex: 1;
      overflow: auto;
      padding: 0;
      background-color: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      text-align: left;
      min-width: max-content;
      table-layout: fixed; /* Better control over widths */
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: #059669; /* Emerald Green */
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }

    th {
      padding: 20px 24px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      color: #ffffff;
      text-align: center;
      border-bottom: 2px solid #047857;
      border-right: 1px solid #047857;
    }

    td {
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
      white-space: normal;
      word-break: break-word;
      line-height: 1.7;
      vertical-align: middle;
      text-align: center;
      transition: var(--tr);
    }

    tr:nth-child(even) td {
      background-color: #fafdff; /* Zebra */
    }

    tr:hover td {
      background-color: #f0fdf4;
    }

    tr:hover td {
      background-color: var(--main-bg);
    }

    /* --- Filter Drawer --- */
    .filter-drawer {
      position: fixed;
      right: -320px;
      top: 0;
      width: 320px;
      height: 100vh;
      background-color: #fafffb;
      box-shadow: -10px 0 30px rgba(16, 185, 129, 0.1);
      z-index: 100;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }

    .filter-drawer.open {
      right: 0;
    }

    .filter-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filter-header h2 {
      font-size: 1.125rem;
      font-weight: 700;
    }

    .btn-close-filter {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
    }

    .filter-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .filter-group {
      margin-bottom: 24px;
    }

    .filter-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .filter-group input, .filter-group select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
    }

    .filter-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      display: flex; gap:12px;
    }

    .btn-reset { flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
    .btn-apply { flex: 1; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; }

    /* --- Empty State --- */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 64px; color: var(--text-muted); text-align: center;
    }
    .empty-state i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }

    .loader-container {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 20;
    }
    .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>
      <i data-lucide="microscope"></i>
      Anderson CMC-ONCO Tracker
    </h1>
  </div>

  <div class="upload-section">
    <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display: none;">
    <button class="btn-upload-trigger" id="btn-upload">
      <i data-lucide="upload-cloud"></i>
      Upload Excel
    </button>
  </div>

  <ul class="nav-list">
    <li class="nav-item">
      <button class="nav-btn active" data-view="Total">
        <span class="label"><i data-lucide="database"></i> Total</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-btn" data-view="Sample Track">
        <span class="label"><i data-lucide="package"></i> Sample Track</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-btn" data-view="DNA Status">
        <span class="label"><i data-lucide="dna"></i> DNA Status</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-btn" data-view="Library Preparation">
        <span class="label"><i data-lucide="flask-conical"></i> Library Prep</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-btn" data-view="Tertiary Analysis">
        <span class="label"><i data-lucide="bar-chart-3"></i> Tertiary Analysis</span>
      </button>
    </li>
  </ul>

  <div class="sidebar-footer">
    <p>© 2026 Anderson CMC-ONCO</p>
    <p>Mint Theme · v1.3.0</p>
  </div>
</aside>

<main class="main-content">
  <header class="top-bar">
    <div class="top-bar-left">
      <div class="search-container">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="global-search" class="search-input" placeholder="Search across all columns...">
        <button class="btn-search-exec" id="btn-search-trigger">
          <i data-lucide="arrow-right"></i>
        </button>
      </div>
    </div>

    <div class="top-bar-right">
      <button class="btn-filter" id="btn-toggle-filter">
        <i data-lucide="filter"></i>
        Filters
      </button>

      <div class="sync-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="sync-time">No file uploaded</span>
      </div>
    </div>
  </header>

  <div class="table-container" id="table-view">
    <div class="empty-state">
      <i data-lucide="upload-cloud"></i>
      <h2>Ready to Track</h2>
      <p>Please upload an Excel file to begin viewing and filtering sample data.</p>
    </div>
  </div>

  <div id="loader" class="loader-container">
    <div class="loader"></div>
  </div>
</main>

<div class="filter-drawer" id="filter-drawer">
  <div class="filter-header">
    <h2>Column Filters</h2>
    <button class="btn-close-filter" id="btn-close-filter"><i data-lucide="x"></i></button>
  </div>
  <div class="filter-content" id="filter-inputs">
    <p style="color: var(--text-muted);">Please upload a file first.</p>
  </div>
  <div class="filter-footer">
    <button class="btn-reset" id="btn-reset-filters">Reset</button>
    <button class="btn-apply" id="btn-apply-filters">Apply</button>
  </div>
</div>

<script>
  // --- CONFIG ---
  const FILTER_CONFIG = [
    { label: "Anderson ID",              col: "Anderson ID",              type: "text" },
    { label: "Sample Number",            col: "Sample Number",            type: "text" },
    { label: "Test",                     col: "Test",                     type: "dropdown" },
    { label: "Client",                   col: "Client",                   type: "dropdown" },
    { label: "Received Date",            col: "Received Date",            type: "date" },
    { label: "Sample QC Sharing Date",   col: "Sample QC Sharing Date",   type: "date" },
    { label: "Library QC Sharing Date",  col: "Library QC Sharing Date",  type: "date" },
    { label: "Date of Sequencing",       col: "Date of Sequencing",       type: "date" },
    { label: "Date of Transferring Data",col: "Date of Transferring Data",type: "date" },
    { label: "DNA Conc (Qubit)",         col: "DNA Conc (Qubit)",         type: "text" },
    { label: "RNA Conc (Qubit)",         col: "RNA Conc (Qubit)",         type: "text" },
    { label: "Name of the Kit",          col: "Name of the Kit",          type: "dropdown" }
  ];

  const VIEWS = {
    'Total': null,
    'Sample Track': ["Anderson ID", "Sample Number", "Test", "Client", "Received Date", "Sample Type"],
    'DNA Status': ["DNA Conc (Qubit)", "RNA Conc (Qubit)", "Sample QC Sharing Date", "Name of the Kit"],
    'Library Preparation': ["Library Concentration", "Library QC Sharing Date", "Date of Sequencing"],
    'Tertiary Analysis': ["Date of Transferring Data", "Remarks"]
  };

  // State
  let rawData = [];
  let headerMap = {}; // normalized -> actual
  let currentView = 'Total';
  let activeFilters = {};
  let globalSearchTerm = '';

  const normalize = str => String(str).toLowerCase().replace(/[^a-z0-9]/g, '');

  const getColWidth = (col) => {
    const name = col.toLowerCase();
    if (name.includes('remark')) return '400px';
    if (name.includes('detail')) return '400px';
    if (name.includes('name')) return '250px';
    if (name.includes('client')) return '200px';
    if (name.includes('date')) return '180px';
    return '150px';
  };

  // Elements
  const tableView = document.getElementById('table-view');
  const filterDrawer = document.getElementById('filter-drawer');
  const filterInputs = document.getElementById('filter-inputs');
  const syncTime = document.getElementById('sync-time');
  const statusDot = document.getElementById('status-dot');
  const globalSearch = document.getElementById('global-search');
  const loader = document.getElementById('loader');
  const fileInput = document.getElementById('excel-file-input');

  lucide.createIcons();

  // --- FILE HANDLING ---
  document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    loader.style.display = 'flex';
    const reader = new FileReader();

    reader.onload = (evt) => {
      try {
        const data = evt.target.result;
        const workbook = XLSX.read(data, { type: 'binary' });
        const firstSheet = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheet];
        rawData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

        // Build Smart Header Map
        headerMap = {};
        if (rawData.length > 0) {
          Object.keys(rawData[0]).forEach(key => {
            headerMap[normalize(key)] = key;
          });
        }

        statusDot.classList.add('active');
        syncTime.textContent = `Last uploaded: ${new Date().toLocaleTimeString()}`;
        renderApp();
      } catch (err) {
        alert("Error parsing Excel file. Please ensure it is a valid .xlsx or .xls file.");
        console.error(err);
      } finally {
        loader.style.display = 'none';
      }
    };

    reader.onerror = () => {
      alert("Error reading file.");
      loader.style.display = 'none';
    };

    reader.readAsBinaryString(file);
  });

  function renderApp() {
    renderTable();
    generateFilterUI();
  }

  function getFilteredData() {
    let data = [...rawData];
    if (globalSearchTerm) {
      const term = globalSearchTerm.toLowerCase();
      data = data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(term)));
    }
    Object.keys(activeFilters).forEach(col => {
      const val = activeFilters[col].toLowerCase();
      data = data.filter(row => String(row[col] || '').toLowerCase().includes(val));
    });
    return data;
  }

  function renderTable() {
    const data = getFilteredData();
    if (rawData.length === 0) return;

    // Map internal requested columns to actual Excel headers
    const requestedCols = VIEWS[currentView] || Object.keys(rawData[0]);
    const actualCols = [];
    const displayNames = [];

    requestedCols.forEach(req => {
      const actual = headerMap[normalize(req)];
      if (actual) {
        actualCols.push(actual);
        displayNames.push(req); // Keep requested name for display consistency
      } else if (currentView === 'Total') {
        // For Total view, just use everything as is if not in map
        actualCols.push(req);
        displayNames.push(req);
      }
    });

    if (data.length === 0) {
      tableView.innerHTML = `<div class="empty-state"><i data-lucide="search-x"></i><p>No matches found.</p></div>`;
      lucide.createIcons();
      return;
    }

    let html = `<table><colgroup>`;
    displayNames.forEach(col => {
      html += `<col style="width: ${getColWidth(col)}">`;
    });
    html += `</colgroup><thead><tr>${displayNames.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>`;
    
    data.forEach(row => {
      html += `<tr>${actualCols.map(c => `<td>${row[c] || ''}</td>`).join('')}</tr>`;
    });
    html += `</tbody></table>`;
    tableView.innerHTML = html;
  }

  function generateFilterUI() {
    if (rawData.length === 0) return;

    let html = '';
    FILTER_CONFIG.forEach(({ label, col, type }) => {
      const actualCol = headerMap[normalize(col)];
      if (!actualCol) return; // column not present in this Excel, skip

      if (type === 'dropdown') {
        const unique = [...new Set(rawData.map(r => String(r[actualCol] || '')).filter(v => v))].sort();
        const opts = unique.map(v => `<option value="${v}"${activeFilters[actualCol] === v ? ' selected' : ''}>${v}</option>`).join('');
        html += `
          <div class="filter-group">
            <label>${label}</label>
            <select data-col="${actualCol}">
              <option value="">— All —</option>
              ${opts}
            </select>
          </div>`;
      } else if (type === 'date') {
        html += `
          <div class="filter-group">
            <label>${label}</label>
            <input type="date" data-col="${actualCol}" value="${activeFilters[actualCol] || ''}">
          </div>`;
      } else {
        html += `
          <div class="filter-group">
            <label>${label}</label>
            <input type="text" data-col="${actualCol}" placeholder="Search…" value="${activeFilters[actualCol] || ''}">
          </div>`;
      }
    });

    filterInputs.innerHTML = html || '<p style="color:var(--text-muted)">No filter columns found in this file.</p>';
  }

  // --- EVENTS ---
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      renderTable();
      generateFilterUI();
    });
  });

  document.getElementById('btn-toggle-filter').addEventListener('click', () => filterDrawer.classList.toggle('open'));
  document.getElementById('btn-close-filter').addEventListener('click', () => filterDrawer.classList.remove('open'));
  
  document.getElementById('btn-apply-filters').addEventListener('click', () => {
    filterInputs.querySelectorAll('input, select').forEach(el => {
      if (el.value.trim()) activeFilters[el.dataset.col] = el.value.trim();
      else delete activeFilters[el.dataset.col];
    });
    renderTable();
    filterDrawer.classList.remove('open');
  });

  document.getElementById('btn-reset-filters').addEventListener('click', () => {
    activeFilters = {};
    filterInputs.querySelectorAll('input, select').forEach(el => el.value = '');
    renderTable();
  });

  globalSearch.addEventListener('input', (e) => { globalSearchTerm = e.target.value; renderTable(); });
  document.getElementById('btn-search-trigger').addEventListener('click', () => renderTable());

</script>
</body>
</html>
